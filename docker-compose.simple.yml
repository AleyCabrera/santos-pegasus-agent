# ============================================================
# DOCKER-COMPOSE SIMPLIFICADO - Para equipos con recursos limitados
# ============================================================

services:
  ollama:
    image: ollama/ollama:latest
    container_name: santos-pegasus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G

  app:
    build: .
    container_name: santos-pegasus-app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - OLLAMA_TEMPERATURE=0.7
      - OLLAMA_CONTEXT_WINDOW=2048
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=50
      - DEBUG=True
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        echo '⏳ Esperando Ollama...' &&
        sleep 15 &&
        echo '🚀 Iniciando Streamlit...' &&
        streamlit run app/ui/app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
      "

volumes:
  ollama_data: