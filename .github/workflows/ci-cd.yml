name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ============================================
  # JOB 1: TESTS
  # ============================================
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: 🔍 Lint with flake8
        run: |
          flake8 app/ tests/ --count --max-complexity=10 --statistics
      
      - name: 🔍 Type check with mypy
        run: |
          mypy app/ --ignore-missing-imports
      
      - name: 🧪 Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html
      
      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: 📤 Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 7

  # ============================================
  # JOB 2: SECURITY SCAN
  # ============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📦 Install dependencies
        run: |
          pip install bandit safety
      
      - name: 🔒 Run Bandit (security linter)
        run: |
          bandit -r app/ -f json -o bandit-report.json
      
      - name: 🔒 Run Safety (vulnerability check)
        run: |
          safety check -r requirements.txt
      
      - name: 📤 Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json
          retention-days: 7

  # ============================================
  # JOB 3: BUILD
  # ============================================
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install build
      
      - name: 🏗️ Build package
        run: |
          python -m build
      
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ============================================
  # JOB 4: DEPLOY TO DEVELOPMENT
  # ============================================
  deploy-dev:
    name: 🚀 Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev.santos-pegasus.com
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: 🚀 Deploy to Development
        run: |
          echo "🚀 Desplegando a DEVELOPMENT..."
          echo "📁 Ambiente: ${{ github.ref_name }}"
          echo "🔑 Usando secretos: ${{ secrets.DEV_API_KEY != '' }}"
          # Aquí van los comandos reales de despliegue
          # Ejemplo para un VPS:
          # rsync -avz ./ user@dev-server:/app/
          # ssh user@dev-server "cd /app && docker-compose up -d"
      
      - name: ✅ Health check
        run: |
          echo "✅ Servicio desplegado correctamente"
          # curl -f https://dev.santos-pegasus.com/health

  # ============================================
  # JOB 5: DEPLOY TO STAGING
  # ============================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.santos-pegasus.com
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: 🚀 Deploy to Staging
        run: |
          echo "🚀 Desplegando a STAGING..."
          echo "📁 Ambiente: ${{ github.ref_name }}"
          echo "🔑 Usando secretos: ${{ secrets.STAGING_API_KEY != '' }}"
          # Comandos reales de despliegue a staging
      
      - name: ✅ Health check
        run: |
          echo "✅ Servicio desplegado correctamente"
          # curl -f https://staging.santos-pegasus.com/health

  # ============================================
  # JOB 6: DEPLOY TO PRODUCTION (MANUAL)
  # ============================================
  deploy-prod:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://santos-pegasus.com
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: 🚀 Deploy to Production
        run: |
          echo "🚀 Desplegando a PRODUCCIÓN..."
          echo "📁 Versión: ${{ github.ref_name }}"
          echo "🔑 Usando secretos: ${{ secrets.PROD_API_KEY != '' }}"
          # Comandos reales de despliegue a producción
      
      - name: ✅ Health check
        run: |
          echo "✅ Servicio desplegado correctamente"
          # curl -f https://santos-pegasus.com/health
      
      - name: 📝 Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Ambiente | Estado | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ✅ Success | https://santos-pegasus.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Versión | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY