services:
  # ==========================================================
  # SERVICIO OLLAMA - LLM Local
  # ==========================================================
  ollama:
    image: ollama/ollama:latest
    container_name: santos-pegasus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ==========================================================
  # SERVICIO APP - FastAPI
  # ==========================================================
  app:
    build: .
    container_name: santos-pegasus-app
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - OLLAMA_TEMPERATURE=0.7
      - OLLAMA_CONTEXT_WINDOW=2048
      - DEBUG=True
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
      - ./logs:/app/logs
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    # Healthcheck usando Python (siempre disponible)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    command: >
      sh -c "
        echo '⏳ Esperando que Ollama esté listo...' &&
        sleep 10 &&
        echo '🚀 Iniciando FastAPI...' &&
        uvicorn main:app --host 0.0.0.0 --port 8000
      "

  # ==========================================================
  # SERVICIO UI - Streamlit
  # ==========================================================
  ui:
    build: .
    container_name: santos-pegasus-ui
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - OLLAMA_TEMPERATURE=0.7
      - OLLAMA_CONTEXT_WINDOW=2048
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
      - ./logs:/app/logs
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        echo ' Esperando que Ollama esté listo...' &&
        sleep 15 &&
        echo ' Iniciando Streamlit...' &&
        streamlit run app/ui/app.py --server.port=8501 --server.address=0.0.0.0
      "

# ============================================================
# VOLÚMENES
# ============================================================
volumes:
  ollama_data:
    name: santos-pegasus-ollama-data